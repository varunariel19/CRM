<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Theme Layout</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;
        background: #121212;
        color: #fff;
        height: 100vh;
        overflow: hidden;
    }

    /* Header */
    .header {
        height: 60px;
        background: #1e1e1e;
        display: flex;
        align-items: center;
        padding: 0 20px;
        border-bottom: 1px solid #333;
    }

    .menu-btn {
        background: #333;
        color: white;
        border: none;
        padding: 10px 14px;
        border-radius: 6px;
        cursor: pointer;
    }

    /* Sidebar */
    .sidebar {
        position: fixed;
        top: 0;
        left: -260px;
        width: 260px;
        height: 100%;
        background: #1a1a1a;
        transition: 0.3s;
        padding: 20px;
        border-right: 1px solid #333;
        z-index: 1000;
    }

    .sidebar.active {
        left: 0;
    }

    .sidebar h2 {
        margin-bottom: 20px;
    }

    .sidebar ul {
        list-style: none;
    }

    .sidebar li {
        padding: 12px 0;
        border-bottom: 1px solid #333;
    }

    /* Main Content */
    .main {
        height: calc(100vh - 120px);
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    .card {
        background: #1e1e1e;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 0 15px rgba(255,255,255,0.05);
    }

    /* Footer */
    .footer {
        height: 60px;
        background: #1e1e1e;
        display: flex;
        align-items: center;
        justify-content: center;
        border-top: 1px solid #333;
    }

    /* Popup */
    .popup-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        display: none;
        justify-content: center;
        align-items: center;
    }

    .popup-overlay.active {
        display: flex;
    }

    .popup {
        background: #1e1e1e;
        padding: 25px;
        border-radius: 12px;
        width: 350px;
        text-align: center;
    }

    .popup button {
        margin-top: 15px;
        padding: 10px 20px;
        background: #444;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <h2>Menu</h2>
    <ul>
        <li>Dashboard</li>
        <li>Profile</li>
        <li>Settings</li>
        <li>Logout</li>
    </ul>
</div>

<!-- Header -->
<header class="header">
    <button class="menu-btn" onclick="toggleSidebar()">☰ Menu</button>

    <button class="menu-btn" style="margin-left:10px"
        onclick="openPopup()">
        Open Popup
    </button>
</header>

<!-- Center Content -->
<main class="main">
    <div class="card">
        <h1>Centered Content</h1>
        <p>This content stays centered on the page.</p>
    </div>
</main>

<!-- Footer -->
<footer class="footer">
    <p>© 2026 Footer Area</p>
</footer>

<!-- Popup -->
<div class="popup-overlay" id="popup">
    <div class="popup">
        <h2>Popup Modal</h2>
        <p>This is a dark themed popup.</p>
        <button onclick="closePopup()">Close</button>
    </div>
</div>

<script>
    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("active");
    }

    function openPopup() {
        document.getElementById("popup").classList.add("active");
    }

    function closePopup() {
        document.getElementById("popup").classList.remove("active");
    }
</script>

</body>
</html>
