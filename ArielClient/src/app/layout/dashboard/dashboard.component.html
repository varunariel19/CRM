<div class="dashboard-layout">

  <div class="dashboard-body">

    <div class="workspace-wrapper">

      <div class="action-bar">
        <div class="action-bar-left">
          <button class="ab-btn ab-btn-icon" (click)="goToPreviousMenu()" title="Back">
            <i class="fas fa-arrow-left"></i>
          </button>

          <div class="ab-divider"></div>

          <h2 class="ab-title">{{ selectedMenu().label }}</h2>
        </div>

        <div class="action-bar-right">
          <button class="ab-view-toggle" [class.active]="this.globalState.myViewOnly()"
            (click)="this.globalState.toggle()" title="Toggle between your items and everyone's">
            <i class="fas fa-user"></i>
            <span>My Dashboard View</span>
            <i class="fas fa-check ab-check" *ngIf="this.globalState.myViewOnly()"></i>
          </button>

          <div class="ab-divider"></div>

          <button class="ab-btn ab-btn-icon" (click)="refresh()" title="Reload">
            <i class="fas fa-sync-alt"></i>
          </button>



          <button class="ab-btn ab-btn-icon ab-btn-more" title="More">
            <i class="fas fa-ellipsis-v"></i>
          </button>
        </div>
      </div>

      <ng-container [ngSwitch]="selectedMenu().route">
        <div *ngSwitchCase="'analytics'">
          <app-analytics-dashboard />
        </div>

        <div *ngSwitchCase="'leads'">
          <app-lead-management />
        </div>

        <div *ngSwitchCase="'customers'">
          <app-customer-profiles />
        </div>

        <div *ngSwitchCase="'deals'">
          <app-deals-pipeline />
        </div>

        <div *ngSwitchCase="'tasks'">
          <app-task-follow-up />
        </div>

        <div *ngSwitchCase="'tickets'">
          <app-customer-tickets />
        </div>

        <div *ngSwitchCase="'appointments'">
          <app-appointment-scheduler />
        </div>

        <div *ngSwitchCase="'team-members'">
          <app-team-members />
        </div>

        <div *ngSwitchCase="'teams'">
          <app-teams />
        </div>

        <div *ngSwitchCase="'audit-history'">
          <app-audit-history />
        </div>

        <div *ngSwitchCase="'projects'">
          <app-projects></app-projects>
        </div>

        <div *ngSwitchCase="'task-management'">
          <app-task-management />
        </div>

        <div *ngSwitchDefault>
          Select Menu
        </div>
      </ng-container>

    </div>

  </div>

</div>
