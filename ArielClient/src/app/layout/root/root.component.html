<div class="layout">

  <!-- Fixed Header -->
  <app-header class="header"></app-header>

  <!-- Main Area -->
  <div class="main-container">

    <!-- Sidebar -->
    <app-sidebar
      class="sidebar"
      [class.collapsed]="isSidebarCollapsed">
    </app-sidebar>

    <!-- Dashboard / Content -->
    <main
      class="main-content"
      [class.expanded]="isSidebarCollapsed">

      <app-dashboard></app-dashboard>

    </main>

  </div>

</div>
