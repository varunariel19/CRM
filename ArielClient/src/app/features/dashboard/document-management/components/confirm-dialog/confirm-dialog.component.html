<div class="confirm-overlay" (click)="onOverlayClick()">
  <div class="confirm-dialog" (click)="onDialogClick($event)">

    <div class="confirm-header">
      <span class="confirm-title">{{ title }}</span>
      <button class="confirm-close" (click)="cancel.emit()" aria-label="Close">✕</button>
    </div>

    <div class="confirm-body">
      <span class="confirm-icon" [class.danger]="danger">
      <i class="fa-solid fa-triangle-exclamation fa-2x"></i>
      </span>
      <p class="confirm-message">{{ message }}</p>
    </div>

    <div class="confirm-footer">
      <button class="confirm-btn confirm-btn-primary" (click)="confirm.emit()">
        {{ confirmLabel }}
      </button>
      <button class="confirm-btn confirm-btn-secondary" [class.danger]="danger" (click)="cancel.emit()">
        {{ cancelLabel }}
      </button>
    </div>

  </div>
</div>
