<div class="properties-overlay" (click)="close.emit()">
  <div class="properties-dialog" (click)="$event.stopPropagation()">

    <div class="properties-topbar">
      <button class="icon-btn favorite-btn" [class.active]="favorite" (click)="toggleFavorite.emit()"
        aria-label="Favorite">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M12 3l2.6 5.6 6.1.6-4.6 4.1 1.3 6-5.4-3.1-5.4 3.1 1.3-6-4.6-4.1 6.1-.6z"
            [attr.fill]="favorite ? 'currentColor' : 'none'" />
        </svg>
      </button>

      <button class="icon-btn close-btn" (click)="close.emit()" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M6 6l12 12M18 6L6 18" />
        </svg>
      </button>
    </div>

    <div class="properties-hero">
      <div class="hero-icon-wrapper">
        <img [src]="icon" [class.file-thumb]="!isFolder" class="hero-icon" alt="">

        @if (isFolder) {
        <button class="edit-badge" (click)="editIcon.emit()" aria-label="Edit icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M4 20l4-1 11-11-3-3L5 16l-1 4z" />
          </svg>
        </button>
        }
      </div>

      <h3 class="hero-title">{{ name }}</h3>
      <p class="hero-subtitle">{{ subtitle }}</p>
      @if (secondarySubtitle) {
      <p class="hero-subtitle muted">{{ secondarySubtitle }}</p>
      }
    </div>

    <div class="properties-section">
      <div class="properties-field">
        <span class="field-label">Parent Folder</span>
        <div class="field-value-row">
          <span class="field-value">{{ parentPath }}</span>
          <button class="field-action" (click)="openParent.emit()" aria-label="Open parent folder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
              <path d="M3 7a1 1 0 011-1h4l2 2h10a1 1 0 011 1v9a1 1 0 01-1 1H4a1 1 0 01-1-1z" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div class="properties-section grouped">
      @if (!isFolder && accessed) {
      <div class="properties-field">
        <span class="field-label">Accessed</span>
        <span class="field-value">{{ accessed }}</span>
      </div>
      }
      <div class="properties-field">
        <span class="field-label">Modified</span>
        <span class="field-value">{{ modified }}</span>
      </div>
      <div class="properties-field">
        <span class="field-label">Created</span>
        <span class="field-value">{{ created  | date}}</span>
      </div>
    </div>

    <div class="properties-section">
      <div class="properties-row-flat">
        <span class="field-label-inline">Permissions</span>
        <button class="permissions-value" (click)="openPermissions.emit()">
          <span>{{ permissionsLabel }}</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M9 6l6 6-6 6" />
          </svg>
        </button>
      </div>
    </div>

  </div>
</div>
