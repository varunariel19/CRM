<div class="tasks-wrapper">

  <div class="modal-overlay" *ngIf="showCreateModal" (click)="closeModal($event)">
    <div class="modal-box">

      <div class="modal-header">
        <h2>Add Pending Action Item</h2>
        <button class="modal-close" (click)="dismissCreateModal()">
          <i class="fas fa-times"></i>
        </button>
      </div>

      <div class="modal-body">

        <div class="form-group full-width">
          <label>Task Description / Title <span class="required">*</span></label>
          <input type="text" [(ngModel)]="newTask.title" placeholder="e.g. Schedule AWS review workshop" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Due Date</label>
            <input type="date" [(ngModel)]="newTask.dueDate" />
          </div>
          <div class="form-group">
            <label>Call Category Type</label>
            <div class="type-select-wrap" (click)="$event.stopPropagation()">
              <button type="button" class="type-select-trigger" [class.open]="isTypeDropdownOpen"
                (click)="toggleTypeDropdown($event)">
                <span class="type-option-main" *ngIf="selectedTaskTypeOption; else typePlaceholder">
                  <span class="type-icon" [ngClass]="selectedTaskTypeOption.className">
                    <i [ngClass]="selectedTaskTypeOption.icon"></i>
                  </span>
                  <span class="type-option-text">{{ selectedTaskTypeOption.label }}</span>
                </span>
                <ng-template #typePlaceholder>
                  <span class="type-placeholder">None</span>
                </ng-template>
                <i class="fas fa-chevron-down type-chevron"></i>
              </button>

              <div class="type-menu" *ngIf="isTypeDropdownOpen">
                <button type="button" class="type-menu-item" *ngFor="let type of taskTypeOptions"
                  [class.selected]="newTask.type === type.value" (click)="selectTaskType(type)">
                  <span class="type-icon" [ngClass]="type.className">
                    <i [ngClass]="type.icon"></i>
                  </span>
                  <span class="type-option-text">{{ type.label }}</span>
                  <i class="fas fa-check type-check" *ngIf="newTask.type === type.value"></i>
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="form-group full-width">
          <label>Assignee Staff Member</label>
          <select [(ngModel)]="newTask.assignedTo">
            <option [value]="null" disabled>None</option>
            <option *ngFor="let member of teamMembers" [value]="member.id">
              {{ member.name }}
            </option>
          </select>
        </div>

        <div class="context-section">
          <label class="context-label">CONTEXT ALIGNMENT (OPTIONAL)</label>
          <div class="form-row">
            <div class="form-group">
              <label>Connect to Lead</label>
              <select [(ngModel)]="newTask.leadId" (ngModelChange)="onLeadSelect($event)">
                <option [value]="null" disabled>None</option>
                <option *ngFor="let lead of leads" [value]="lead.id">
                  {{ lead.name }}
                </option>
              </select>
            </div>
            <div class="form-group">
              <label>Connect to Deal</label>
              <select [(ngModel)]="newTask.dealId" (ngModelChange)="onDealSelect($event)">
                <option [value]="null" disabled>None</option>
                <option *ngFor="let deal of deals" [value]="deal.id">
                  {{ deal.title }}
                </option>
              </select>
            </div>
          </div>
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn-cancel" (click)="dismissCreateModal()">Cancel</button>
        <button class="btn-register" (click)="submitTask()">Save Task</button>
      </div>

    </div>
  </div>

  <div class="tasks-topbar">

    <div class="tabs">
      <button [class.active]="activeTab === 'pending'" (click)="activeTab = 'pending'">
        Pending Reminders
      </button>
      <button [class.active]="activeTab === 'completed'" (click)="activeTab = 'completed'">
        Completed Tasks
      </button>
      <button [class.active]="activeTab === 'all'" (click)="activeTab = 'all'">
        All Logs
      </button>
    </div>

    <button class="add-btn" (click)="openCreateModal()">
      <i class="fas fa-plus"></i>
      Add Task Action
    </button>

  </div>

  <div class="tasks-list">

    <div class="task-card" *ngFor="let task of filteredTasks()">

      <div class="task-left">
        <input type="checkbox" [checked]="isCompleted(task)" (change)="toggleTask(task ,$event)" />
        <div>
          <h3 [class.completed]="isCompleted(task)">{{ task.title }}</h3>
          <div class="task-meta">
            <span class="tag" [ngClass]="getTaskTypeClass(task.type)">
              <i [ngClass]="getTaskTypeOption(task.type).icon"></i>
              {{ getTaskTypeOption(task.type).label }}
            </span>
            <span class="due-date">
              <i class="fas fa-clock"></i>
              Due: {{ task.dueDate }}
            </span>
            <span *ngIf="task.leadName" class="lead-pill">
              <i class="fas fa-link"></i>
              Lead: {{ task.leadName }}
            </span>

            <span *ngIf="task.dealTitle" class="deal-pill">
              <i class="fas fa-link"></i>
              {{ task.dealTitle }}
            </span>
          </div>
        </div>
      </div>

      <div class="task-right">
        <div class="representative">
          <i class="fas fa-user"></i>
          Representative: {{ task.assignedToName }}
        </div>
        <i class="fas fa-trash delete-icon" (click)="deleteTask(task.id)"></i>
      </div>

    </div>

  </div>

</div>
