<!-- GENERIC DELETE CONFIRMATION MODAL -->
<div *ngIf="isOpen" class="tm-overlay" (click)="onCancel()">
  <div class="tm-modal tm-delete-modal" (click)="$event.stopPropagation()">
    <div class="tm-delete-modal__icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
        <line x1="12" y1="9" x2="12" y2="13" />
        <line x1="12" y1="17" x2="12.01" y2="17" />
      </svg>
    </div>

    <h2 class="tm-delete-modal__title">{{ title }}</h2>
    <p class="tm-delete-modal__sub">{{ subtitle }}</p>

    <p class="tm-delete-modal__instruction">
      Type <strong>{{ confirmPhrase }}</strong> to confirm.
    </p>

    <input
      class="tm-input tm-delete-modal__input"
      type="text"
      [value]="confirmText()"
      (input)="onConfirmInput($any($event.target).value)"
      [placeholder]="confirmPhrase"
      autocomplete="off"
    />

    <div class="tm-modal__footer tm-delete-modal__footer">
      <button class="tm-btn-ghost" (click)="onCancel()" [disabled]="isProcessing">
        {{ cancelButtonText }}
      </button>
      <button class="tm-btn-danger" (click)="onConfirm()" [disabled]="!isConfirmed() || isProcessing">
        <span *ngIf="isProcessing" class="tm-btn-spinner"></span>
        <svg *ngIf="!isProcessing" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2">
          <polyline points="3 6 5 6 21 6" />
          <path d="M19 6l-1 14H6L5 6" />
          <path d="M10 11v6M14 11v6" />
          <path d="M9 6V4h6v2" />
        </svg>
        {{ isProcessing ? processingText : confirmButtonText }}
      </button>
    </div>
  </div>
</div>
