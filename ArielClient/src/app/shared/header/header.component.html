<header class="header">

  <div class="left-section">

    <div class="logo">
      CRM
    </div>

    <div class="brand">
      Ariel CRM
    </div>


    <button class="toggle-btn" type="button" (click)="onToggleSidebar()">

      <i class="fas" [class.fa-bars]="isSidebarCollapsed" [class.fa-chevron-left]="!isSidebarCollapsed">
      </i>
    </button>

  </div>


  <div class="center-section">


    <div class="search-box">
      <input type="text" placeholder="Search customers, leads, invoices..." />
    </div>
  </div>

  <div class="right-section">


    <button class="icon-btn" type="button" aria-label="Notifications" title="Notifications">
      <i class="fa-regular fa-bell"></i>
    </button>


    <button class="icon-btn" type="button"
      [attr.aria-label]="isDarkTheme ? 'Switch to light mode' : 'Switch to dark mode'"
      [attr.title]="isDarkTheme ? 'Switch to light mode' : 'Switch to dark mode'"
      (click)="this.themeService.toggleTheme()">
      <i class="fa-solid" [class.fa-sun]="isDarkTheme" [class.fa-moon]="!isDarkTheme"></i>
    </button>


    <button class="icon-btn" type="button" aria-label="Settings" title="Settings">
      <i class="fa-solid fa-gear"></i>
    </button>


    <div class="profile">
      <img src="https://i.pravatar.cc/100" alt="profile" />

      <div class="profile-info">
        <h4>Varun</h4>
        <p>Admin</p>
      </div>
    </div>

    <button class="logout-btn" type="button" aria-label="Logout" title="Logout" (click)="logout()">
      <i class="fa-solid fa-right-from-bracket"></i>
    </button>

  </div>

</header>
