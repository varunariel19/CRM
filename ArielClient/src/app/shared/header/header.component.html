<header class="header">

  <div class="left-section">

    <div class="logo">
      CRM
    </div>

    <div class="brand">
      Ariel CRM
    </div>

    <button class="toggle-btn" type="button" (click)="onToggleSidebar()">
      <i class="fas" [class.fa-bars]="isSidebarCollapsed" [class.fa-chevron-left]="!isSidebarCollapsed">
      </i>
    </button>

  </div>

  <div class="center-section">
    <div class="search-box">
      <input type="search" name="global-search" autocomplete="off" autocorrect="off" autocapitalize="off"
        spellcheck="false" data-lpignore="true" placeholder="Search customers, leads, invoices..." />
    </div>
  </div>

  <div class="right-section">

    <button class="icon-btn" type="button" aria-label="Notifications" title="Notifications">
      <i class="fa-regular fa-bell"></i>
    </button>

    <button class="icon-btn" type="button"
      [attr.aria-label]="isDarkTheme ? 'Switch to light mode' : 'Switch to dark mode'"
      [attr.title]="isDarkTheme ? 'Switch to light mode' : 'Switch to dark mode'"
      (click)="themeService.toggleTheme()">
      <i class="fa-solid" [class.fa-sun]="isDarkTheme" [class.fa-moon]="!isDarkTheme"></i>
    </button>

    @if(perm.dashboard.canView()) {
      <button class="icon-btn" type="button" (click)="showSettings.set(true)">
        <i class="fa-solid fa-gear"></i>
      </button>

      @if(showSettings()) {
        <app-settings (close)="showSettings.set(false)" />
      }
    }

    @if(userDetails) {
      <div (click)="showProfile.set(true)" style="cursor:pointer">
        @if(userDetails.profileImage) {
          <img [src]="userDetails.profileImage" alt="profile" />
        } @else {
          <div class="avatar" [style.background]="getProfileColor(userDetails.name)">
            {{ userDetails.name.charAt(0).toUpperCase() }}
          </div>
        }
      </div>
    }

    @if(showProfile()) {
      <app-profile-section (close)="showProfile.set(false)" />
    }

    <button class="logout-btn" type="button" aria-label="Logout" title="Logout" (click)="logout()">
      <i class="fa-solid fa-right-from-bracket"></i>
    </button>

  </div>

</header>
