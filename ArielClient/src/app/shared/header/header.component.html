<header class="header">

  <div class="left-section">

    <div class="logo-stack">
      <div class="logo">
        <img [src]="CrmLogo" alt="CRM Logo" class="brand-logo" />
      </div>

      <div class="brand">
        <img [src]="LogoUrl" alt="Ariel CRM Logo" class="ariel-logo" />
      </div>
    </div>

    <button class="toggle-btn" type="button" (click)="onToggleSidebar()">
      <i class="fas" [class.fa-bars]="isSidebarCollapsed" [class.fa-chevron-left]="!isSidebarCollapsed">
      </i>
    </button>

  </div>

  <div class="center-section">
    <div class="search-box">
      <input type="search" name="global-search" autocomplete="off" autocorrect="off" autocapitalize="off"
        spellcheck="false" data-lpignore="true" placeholder="Search customers, leads, invoices..." />
    </div>
  </div>

  <div class="right-section">

    <button class="icon-btn" type="button" aria-label="Notifications" title="Notifications"
      (click)="globalState.toggleNotificationPanel()">
      <i class="fa-regular fa-bell"></i>
      <span class="ab-badge" *ngIf="notificationState.unreadCount() > 0">{{ notificationState.unreadCount() }}</span>
    </button>

    <button class="icon-btn" type="button"
      [attr.aria-label]="isDarkTheme ? 'Switch to light mode' : 'Switch to dark mode'"
      [attr.title]="isDarkTheme ? 'Switch to light mode' : 'Switch to dark mode'" (click)="themeService.toggleTheme()">
      <i class="fa-solid" [class.fa-sun]="isDarkTheme" [class.fa-moon]="!isDarkTheme"></i>
    </button>

    @if(perm.settings.canView()) {
    <button class="icon-btn" type="button" (click)="showSettings.set(true)">
      <i class="fa-solid fa-gear"></i>
    </button>

    @if(showSettings()) {
    <app-settings (close)="showSettings.set(false)" />
    }
    }

    @if(userDetails)
    {
    <button class="profile-trigger" type="button" (click)="showProfile.set(true)" aria-label="Open profile">
      <app-user-profile [name]="userDetails.name" [profileImage]="userDetails.profileImage" size="md" shape="rounded" />
    </button>
    }

    @if(showProfile()) {
    <app-profile-section (close)="showProfile.set(false)" />
    }

    <button class="logout-btn" type="button" aria-label="Logout" title="Logout" (click)="openLogoutConfirm()">
      <i class="fa-solid fa-right-from-bracket"></i>
    </button>

  </div>

</header>

@if(showLogoutConfirm()) {
<div class="modal-overlay" (click)="cancelLogout()">
  <div class="modal-box" (click)="$event.stopPropagation()">
    <div class="modal-icon">
      <i class="fa-solid fa-right-from-bracket"></i>
    </div>
    <h3 class="modal-title">Confirm Logout</h3>
    <p class="modal-message">Are you sure you want to log out of your account?</p>
    <div class="modal-actions">
      <button class="modal-btn cancel-btn" type="button" (click)="cancelLogout()">Cancel</button>
      <button class="modal-btn confirm-btn" type="button" (click)="confirmLogout()">Logout</button>
    </div>
  </div>
</div>
}
